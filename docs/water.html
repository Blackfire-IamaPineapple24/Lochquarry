<!DOCTYPE html>
<html>
    <head>
        <meta lang="en-GB">
        <title> Water Activities - Lochquarry Activity Centre </title>
        <link rel="icon" href="resources/images/favicon.ico">
        <link rel="stylesheet" href="resources/style.css">
        <script src="resources/script.js"></script>
        <style>
            .container
            {
                height: 1500px;
            }
        </style>
    </head>
    <body>
        <button id="light-toggle-button" onclick="ToggleLightMode();" class="ldm-button"> Light Mode </button>
        <div class="container">
            <div class="content">
                <div class="navigation-tabs">
                    <!-- Logo -->
                    <img src="resources/images/logo.png" height="100px" style="margin-left: 45px; margin-top: 5px;">
                    <p style="position: fixed; padding-left: 6px; user-select: none;"> Lochquarry Outdoor Centre </p>
                    <!-- Buttons -->
                    <button class="tab-button" onClick="document.location='rope.html'"> Rope Activities </button> <!-- Putting the other pages in the index of individual folders means the browser's URL bar doesn't show ".html" on the end. -->
                    <button class="tab-button" onClick="document.location='water.html'"> Water Activities </button>
                    <button class="tab-button" onClick="document.location='land.html'"> Land Activities </button>
                    <button class="tab-button" onClick="document.location='info.html'"> Information </button>
                    <button class="tab-button" onClick="document.location='index.html'"> Home </button>
                </div>
                <div class="main-content">
                    <br style="margin-top: 128px;">

                    <div class="sidebar">
                        <button class="side-button" onClick="WaterHome();"> Home </button>
                        <button class="side-button" onClick="WaterKayaking();"> Kayaking </button>
                        <button class="side-button" onClick="WaterCanoeing();"> Canoeing </button>
                        <button class="side-button" onClick="WaterPowerboating();" style="margin-bottom: 35px;"> Powerboating </button>
                    </div>

                    <div class="text">
                        <h4> Activities </h4>
                        <h1 id="heading"> Water </h1>
                        <br>

                        <p id="content"> Water-based activities all take place on Lochquarry itself. </p>
                        <img src="resources/images/boat.webp" id="image" height="160">
                        <h4 id="info"></h4>
                        <br>

                        <h3> Sophie, Aged 10 </h3>
                        <p> "I was really scared about the abseiling but the instructor Mike was really encouraging and helped me to do it, thanks Mike." </p> <!-- Mr. Ehrmantraut is great with kids! -->
                        <a id="link" href="https://bsky.app/profile/mhunter.bsky.social"> https://bsky.app/profile/mhunter.bsky.social </a>
                        <br>
                        <img src="resources/images/darkmap.webp" id="map" class="dummy">
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
